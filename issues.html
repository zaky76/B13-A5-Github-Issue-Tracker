    <header>
        <div class="bg-white shadow py-1.5 px-1.5 ">
            <div class="w-[90%] mx-auto  flex justify-between py-0.5 px-0.5">
                <div class="leftSide flex gap-1.5 items-center ">
                    <img src="./assets/github-logo.png" class="w-9" alt="">
                    <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                </div>
                <div class="rightSide flex gap-1.5 items-center">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="search-input" type="search" required placeholder="Search" />
                    </label>
                    <button class="btn bg-[#4A00FF] text-white">+New Issue</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section id="buttonSec">
            <div
                class="w-[75%] mx-auto mt-12 mb-5 text-center rounded-xl md:text-left lg:text-left py-6 px-6 shadow-[0_0_15px_5px_rgba(0,0,0,0.1)]">
                <button onclick="toggleStyle('all-btn')"
                    class="bg-[#4A00FF] text-white border border-gray-300 rounded  px-6 py-2" id="all-btn">All</button>
                <button onclick="toggleStyle('open-btn')" class="bg-white border border-gray-300 rounded px-6 py-2"
                    id="open-btn">Open</button>
                <button onclick="toggleStyle('closed-btn')" class="bg-white border border-gray-300 rounded px-6 py-2"
                    id="closed-btn">Closed</button>
            </div>
        </section>
        <section id="totalIssue">
            <div
                class="w-[75%] mx-auto  mb-5 text-center rounded-xl md:text-left lg:text-left py-6 px-6 shadow-[0_0_15px_5px_rgba(0,0,0,0.1)]">
                <div class="top-sec flex justify-between">
                    <div class="flex gap-2 items-center">
                        <div class="bg-purple-100 p-3 rounded-full">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h2 id="countAllIssue" class="text-2xl text-[#1F2937] font-semibold">50 Issues</h2>
                            <p>Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 font-sans text-slate-800">
                        <div class="flex items-center gap-2">
                            <span class="h-4 w-4 rounded-full bg-[#00a86b]"></span>
                            <span class="text-lg font-medium">Open</span>
                        </div>

                        <div class="flex items-center gap-2">
                            <span class="h-4 w-4 rounded-full bg-[#a855f7]"></span>
                            <span class="text-lg font-medium">Closed</span>
                        </div>

                    </div>
                </div>

    <!-- Modal Code -->
    <dialog id="issue_details_modal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <div id="modal-content">
